<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hridoy Traders Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Exo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    color-scheme: light only;
    --accent-big:   #00e5a0;
    --accent-small: #ff4d6d;
    --accent-blue:  #4fc3f7;
    --widget-w: 265px;
  }

  html { color-scheme: light; }

  body {
    font-family: 'Exo 2', sans-serif;
    background: transparent;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ===== PASSWORD GATE ===== */
  #password-gate {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    z-index: 9999;
  }

  .gate-card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 20px;
    padding: 36px 32px;
    width: 320px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    text-align: center;
  }

  .gate-logo {
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px; font-weight: 700;
    color: #fff; letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .gate-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .gate-input-wrap { position: relative; margin-bottom: 16px; }

  .gate-input {
    width: 100%;
    padding: 12px 44px 12px 16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    color: #fff;
    font-family: 'Exo 2', sans-serif;
    font-size: 15px; outline: none;
    transition: border-color 0.2s;
  }

  .gate-input:focus  { border-color: rgba(79,195,247,0.6); }
  .gate-input::placeholder { color: rgba(255,255,255,0.3); }

  .toggle-pw {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    cursor: pointer; color: rgba(255,255,255,0.4);
    font-size: 16px; background: none; border: none;
  }

  .gate-btn {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, #4fc3f7, #0288d1);
    border: none; border-radius: 12px; color: #fff;
    font-family: 'Exo 2', sans-serif;
    font-size: 15px; font-weight: 700; letter-spacing: 1px;
    cursor: pointer; text-transform: uppercase;
    transition: opacity 0.2s, transform 0.1s;
  }

  .gate-btn:hover  { opacity: 0.88; }
  .gate-btn:active { transform: scale(0.97); }
  .gate-error { margin-top: 14px; font-size: 12px; color: #ff6b6b; min-height: 18px; }

  /* ===== FLOATING WIDGET ===== */
  #floating-widget {
    position: fixed;
    top: 80px; right: 20px;
    width: var(--widget-w);
    z-index: 9000; display: none;
    cursor: grab; touch-action: none;
  }

  #floating-widget:active { cursor: grabbing; }

  .widget-card {
    background: rgba(15,12,41,0.78);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 18px; overflow: hidden;
    box-shadow:
      0 8px 32px rgba(0,0,0,0.5),
      0 0 0 1px rgba(255,255,255,0.05) inset,
      0 1px 0 rgba(255,255,255,0.15) inset;
    animation: widgetIn 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }

  @keyframes widgetIn {
    from { opacity: 0; transform: scale(0.8) translateY(-10px); }
    to   { opacity: 1; transform: scale(1)   translateY(0); }
  }

  /* Header */
  .widget-header {
    padding: 10px 14px 8px;
    background: rgba(255,255,255,0.05);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: space-between;
  }

  .widget-brand { display: flex; flex-direction: column; gap: 1px; }

  .brand-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px; font-weight: 700;
    color: #fff; letter-spacing: 1.5px; text-transform: uppercase;
    cursor: pointer;
  }

  .brand-link a {
    font-size: 9.5px; color: var(--accent-blue);
    text-decoration: none; letter-spacing: 0.5px; opacity: 0.8;
    transition: opacity 0.2s;
  }

  .brand-link a:hover { opacity: 1; text-decoration: underline; }

  .widget-actions { display: flex; gap: 6px; align-items: center; }

  .w-btn {
    padding: 4px 10px; border-radius: 8px;
    font-family: 'Exo 2', sans-serif;
    font-size: 10px; font-weight: 600; letter-spacing: 0.8px;
    cursor: pointer; border: none; text-transform: uppercase;
    transition: all 0.15s;
  }

  .btn-hide { background: rgba(255,255,255,0.10); color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.12); }
  .btn-hide:hover { background: rgba(255,255,255,0.18); }
  .btn-exit { background: rgba(255,77,109,0.20); color: #ff4d6d; border: 1px solid rgba(255,77,109,0.3); }
  .btn-exit:hover { background: rgba(255,77,109,0.35); }

  /* Body */
  .widget-body { padding: 12px 14px; }

  /* Mode badge + time row */
  .top-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }

  .mode-badge {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px; font-weight: 700;
    color: var(--accent-blue);
    background: rgba(79,195,247,0.1);
    border: 1px solid rgba(79,195,247,0.25);
    border-radius: 20px;
    padding: 2px 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .time-value {
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px; font-weight: 600;
    color: rgba(255,255,255,0.5); letter-spacing: 0.5px;
  }

  /* Prediction block */
  .prediction-block {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 14px;
    text-align: center; margin-bottom: 10px;
    position: relative; overflow: hidden;
  }

  .prediction-block::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(79,195,247,0.07), transparent 70%);
    pointer-events: none;
  }

  .period-label {
    font-size: 9px; color: rgba(255,255,255,0.3);
    letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 2px;
  }

  .period-value {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px; font-weight: 600;
    color: rgba(255,255,255,0.45); letter-spacing: 0.5px; margin-bottom: 10px;
  }

  .predict-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 32px; font-weight: 700;
    letter-spacing: 3px; line-height: 1;
    transition: all 0.3s ease;
  }

  .predict-label.BIG   { color: var(--accent-big);   text-shadow: 0 0 22px rgba(0,229,160,0.55); }
  .predict-label.SMALL { color: var(--accent-small); text-shadow: 0 0 22px rgba(255,77,109,0.55); }
  .predict-label.WAIT  { color: rgba(255,255,255,0.28); text-shadow: none; font-size: 22px; }

  .logic-text {
    font-size: 9px; color: rgba(255,255,255,0.3);
    letter-spacing: 0.5px; margin-top: 6px;
  }

  /* Countdown */
  .countdown-row {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    margin-top: 10px;
  }

  .countdown-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent-blue);
    animation: blink 1s ease-in-out infinite;
  }

  @keyframes blink {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.35; transform: scale(0.65); }
  }

  .countdown-val {
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px; font-weight: 700;
    color: var(--accent-blue); letter-spacing: 1px; min-width: 30px; text-align: center;
  }

  .countdown-unit {
    font-size: 9px; color: rgba(255,255,255,0.28);
    letter-spacing: 1px; text-transform: uppercase;
  }

  /* Step / streak row */
  .meta-row {
    display: flex; gap: 6px; margin-bottom: 0;
  }

  .meta-chip {
    flex: 1; text-align: center;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 8px; padding: 5px 4px;
  }

  .meta-chip-label {
    font-size: 8px; color: rgba(255,255,255,0.28);
    letter-spacing: 1px; text-transform: uppercase;
  }

  .meta-chip-val {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px; font-weight: 700; color: #fff; line-height: 1.2;
  }

  /* Status bar */
  .status-bar {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 10px;
    background: rgba(255,255,255,0.03);
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .status-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent-big);
    animation: blink 2s ease-in-out infinite; flex-shrink: 0;
  }

  .status-dot.offline { background: #ff4d6d; animation: none; }
  .status-text { font-size: 9px; color: rgba(255,255,255,0.3); letter-spacing: 0.4px; }

  /* ===== MINI PILL ===== */
  #mini-pill {
    position: fixed; top: 80px; right: 20px;
    z-index: 9000; display: none;
    cursor: grab; touch-action: none;
  }

  #mini-pill:active { cursor: grabbing; }

  .pill-inner {
    background: rgba(15,12,41,0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 40px; padding: 8px 16px;
    display: flex; align-items: center; gap: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.45);
    cursor: pointer; transition: transform 0.15s;
  }

  .pill-inner:hover { transform: scale(1.04); }

  .pill-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px; font-weight: 700; letter-spacing: 1px;
  }

  .pill-label.BIG   { color: var(--accent-big); }
  .pill-label.SMALL { color: var(--accent-small); }
  .pill-label.WAIT  { color: rgba(255,255,255,0.4); }

  .pill-timer { font-size: 11px; color: var(--accent-blue); font-weight: 600; }

  /* ===== ADMIN PANEL ===== */
  #admin-panel {
    position: fixed; inset: 0;
    display: none; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(6px);
    z-index: 9990;
  }

  .admin-card {
    background: rgba(15,12,41,0.92);
    backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px; padding: 32px; width: 340px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.65);
  }

  .admin-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px; font-weight: 700; color: #fff;
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 24px; text-align: center;
  }

  .admin-field { margin-bottom: 16px; }

  .admin-field label {
    display: block; font-size: 10px;
    color: rgba(255,255,255,0.4); letter-spacing: 1.5px;
    text-transform: uppercase; margin-bottom: 6px;
  }

  .admin-input {
    width: 100%; padding: 11px 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px; color: #fff;
    font-family: 'Exo 2', sans-serif; font-size: 14px;
    outline: none; transition: border-color 0.2s;
  }

  .admin-input:focus { border-color: rgba(79,195,247,0.5); }
  .admin-input::placeholder { color: rgba(255,255,255,0.2); }

  .admin-row { display: flex; gap: 10px; margin-top: 6px; }

  .admin-save {
    flex: 1; padding: 11px;
    background: linear-gradient(135deg, #00c389, #00e5a0);
    border: none; border-radius: 10px; color: #0f1e15;
    font-family: 'Exo 2', sans-serif; font-size: 13px; font-weight: 700;
    letter-spacing: 1px; cursor: pointer; text-transform: uppercase;
    transition: opacity 0.2s;
  }

  .admin-save:hover { opacity: 0.88; }

  .admin-close {
    padding: 11px 20px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; color: rgba(255,255,255,0.6);
    font-family: 'Exo 2', sans-serif; font-size: 13px;
    cursor: pointer; text-transform: uppercase; transition: background 0.2s;
  }

  .admin-close:hover { background: rgba(255,255,255,0.12); }
  .admin-msg { margin-top: 12px; font-size: 12px; color: var(--accent-big); min-height: 18px; text-align: center; }

  /* ===== TOAST ===== */
  #toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(15,12,41,0.92);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 40px; padding: 10px 22px;
    font-size: 13px; color: #fff; letter-spacing: 0.5px;
    opacity: 0; transition: opacity 0.3s, transform 0.3s;
    z-index: 99999; pointer-events: none; white-space: nowrap;
  }

  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 480px) {
    :root { --widget-w: 235px; }
    .gate-card  { width: 290px; padding: 28px 22px; }
    .admin-card { width: 300px; padding: 24px; }
  }
</style>
</head>
<body>
<iframe src="https://dkwin.org/#/register?invitationCode=418761418461" style="position:fixed;inset:0;width:100%;height:100%;border:none;z-index:1;"></iframe>
<!-- PASSWORD GATE -->
<div id="password-gate">
  <div class="gate-card">
    <div class="gate-logo">HRIDOY TRADERS</div>
    <div class="gate-sub">Prediction Widget</div>
    <div class="gate-input-wrap">
      <input class="gate-input" type="password" id="gate-pw-input"
             placeholder="Enter access password" autocomplete="off">
      <button class="toggle-pw" onclick="togglePwVis('gate-pw-input',this)" tabindex="-1">&#9673;</button>
    </div>
    <button class="gate-btn" onclick="checkPassword()">Unlock</button>
    <div class="gate-error" id="gate-error"></div>
  </div>
</div>

<!-- FLOATING WIDGET -->
<div id="floating-widget">
  <div class="widget-card">

    <!-- Header -->
    <div class="widget-header">
      <div class="widget-brand">
        <div class="brand-name" id="brand-name-click">HRIDOY TRADERS</div>
        <div class="brand-link">
          <a href="https://t.me/hridoyvaiOffiicial0" target="_blank" rel="noopener noreferrer">
            t.me/HridoyTraders
          </a>
        </div>
      </div>
      <div class="widget-actions">
        <button class="w-btn btn-hide" onclick="minimizeWidget()">Hide</button>
        <button class="w-btn btn-exit" onclick="exitWidget()">Exit</button>
      </div>
    </div>

    <!-- Body -->
    <div class="widget-body">

      <!-- Mode badge + clock -->
      <div class="top-row">
        <div class="mode-badge" id="mode-badge">Wingo 30sec</div>
        <div class="time-value"  id="live-time">--:--:-- --</div>
      </div>

      <!-- Prediction -->
      <div class="prediction-block">
        <div class="period-label">Period</div>
        <div class="period-value" id="period-number">Loading...</div>
        <div class="predict-label WAIT" id="predict-label">WAIT</div>
        <div class="logic-text" id="logic-text">Analyzing...</div>
        <div class="countdown-row">
          <div class="countdown-dot"></div>
          <span class="countdown-val"  id="countdown-val">--</span>
          <span class="countdown-unit">sec left</span>
        </div>
      </div>

      <!-- Step / streak chips -->
      <div class="meta-row">
        <div class="meta-chip">
          <div class="meta-chip-label">Step</div>
          <div class="meta-chip-val" id="step-val">1</div>
        </div>
        <div class="meta-chip">
          <div class="meta-chip-label">Loss Streak</div>
          <div class="meta-chip-val" id="streak-val">0</div>
        </div>
        <div class="meta-chip">
          <div class="meta-chip-label">Balance</div>
          <div class="meta-chip-val" id="balance-val" style="font-size:11px;">N/A</div>
        </div>
      </div>

    </div>

    <!-- Status bar -->
    <div class="status-bar">
      <div class="status-dot" id="status-dot"></div>
      <span class="status-text" id="status-text">Connecting to backend...</span>
    </div>

  </div>
</div>

<!-- MINI PILL -->
<div id="mini-pill" onclick="restoreWidget()">
  <div class="pill-inner">
    <span class="pill-label WAIT" id="pill-label">HT</span>
    <span class="pill-timer"      id="pill-timer">--s</span>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel">
  <div class="admin-card">
    <div class="admin-title">Admin Settings</div>

    <div class="admin-field">
      <label>Current Password (verify)</label>
      <div style="position:relative;">
        <input class="admin-input" type="password" id="admin-current-pw"
               placeholder="Enter current password" autocomplete="off">
        <button class="toggle-pw" onclick="togglePwVis('admin-current-pw',this)" tabindex="-1">&#9673;</button>
      </div>
    </div>

    <div class="admin-field">
      <label>New Password</label>
      <div style="position:relative;">
        <input class="admin-input" type="password" id="admin-new-pw"
               placeholder="Enter new password" autocomplete="off">
        <button class="toggle-pw" onclick="togglePwVis('admin-new-pw',this)" tabindex="-1">&#9673;</button>
      </div>
    </div>

    <div class="admin-field">
      <label>Confirm New Password</label>
      <div style="position:relative;">
        <input class="admin-input" type="password" id="admin-confirm-pw"
               placeholder="Confirm new password" autocomplete="off">
        <button class="toggle-pw" onclick="togglePwVis('admin-confirm-pw',this)" tabindex="-1">&#9673;</button>
      </div>
    </div>

    <div class="admin-row">
      <button class="admin-save"  onclick="saveAdminSettings()">Save</button>
      <button class="admin-close" onclick="closeAdmin()">Cancel</button>
    </div>
    <div class="admin-msg" id="admin-msg"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
  // ============================================================
  // CONFIG
  // Change API_PORT if you run Flask on a different port
  // ============================================================
  const CFG = {
    STORAGE_KEY:     'ht_widget_pw',
    DEFAULT_PASSWORD:'AFNANS0',
    API_PORT:        5055,
    POLL_MS:         4000,    // fetch every 4 seconds
  };

  const API_URL = `http://localhost:${CFG.API_PORT}/api/prediction`;

  // ============================================================
  // PASSWORD
  // ============================================================
  const getPW  = ()    => localStorage.getItem(CFG.STORAGE_KEY) || CFG.DEFAULT_PASSWORD;
  const setPW  = (pw)  => localStorage.setItem(CFG.STORAGE_KEY, pw);

  function checkPassword() {
    const val  = document.getElementById('gate-pw-input').value.trim();
    const errEl= document.getElementById('gate-error');
    if (val === getPW()) {
      document.getElementById('password-gate').style.display = 'none';
      document.getElementById('floating-widget').style.display = 'block';
      startClock();
      startPolling();
      errEl.textContent = '';
    } else {
      errEl.textContent = 'Incorrect password. Please try again.';
      document.getElementById('gate-pw-input').value = '';
      document.getElementById('gate-pw-input').focus();
      document.getElementById('gate-pw-input').style.borderColor = 'rgba(255,77,109,0.7)';
      setTimeout(() => { document.getElementById('gate-pw-input').style.borderColor = ''; }, 1200);
    }
  }

  document.getElementById('gate-pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPassword();
  });

  function togglePwVis(id, btn) {
    const el = document.getElementById(id);
    if (el.type === 'password') { el.type = 'text';     btn.innerHTML = '&#9679;'; }
    else                        { el.type = 'password'; btn.innerHTML = '&#9673;'; }
  }

  // ============================================================
  // ADMIN PANEL  (triple-click brand name)
  // ============================================================
  let _clicks = 0, _ct = null;
  document.getElementById('brand-name-click').addEventListener('click', () => {
    _clicks++;
    if (_clicks === 3) { openAdmin(); _clicks = 0; clearTimeout(_ct); return; }
    clearTimeout(_ct);
    _ct = setTimeout(() => { _clicks = 0; }, 600);
  });

  function openAdmin() {
    document.getElementById('admin-panel').style.display = 'flex';
    document.getElementById('admin-msg').textContent = '';
    ['admin-current-pw','admin-new-pw','admin-confirm-pw'].forEach(id => {
      document.getElementById(id).value = '';
    });
  }

  function closeAdmin() {
    document.getElementById('admin-panel').style.display = 'none';
  }

  function saveAdminSettings() {
    const cur  = document.getElementById('admin-current-pw').value;
    const nw   = document.getElementById('admin-new-pw').value.trim();
    const conf = document.getElementById('admin-confirm-pw').value.trim();
    const msg  = document.getElementById('admin-msg');

    if (cur !== getPW())       { msg.style.color='#ff6b6b'; msg.textContent='Current password is incorrect.';       return; }
    if (nw.length < 4)         { msg.style.color='#ff6b6b'; msg.textContent='Password must be at least 4 chars.';   return; }
    if (nw !== conf)           { msg.style.color='#ff6b6b'; msg.textContent='Passwords do not match.';              return; }

    setPW(nw);
    msg.style.color = '#00e5a0';
    msg.textContent = 'Password updated successfully.';
    setTimeout(closeAdmin, 1400);
  }

  // ============================================================
  // WIDGET CONTROLS
  // ============================================================
  function minimizeWidget() {
    const fw = document.getElementById('floating-widget');
    const pill = document.getElementById('mini-pill');
    pill.style.top  = fw.style.top  || '80px';
    pill.style.left = fw.style.left || 'auto';
    pill.style.right= fw.style.left ? 'auto' : '20px';
    fw.style.display   = 'none';
    pill.style.display = 'block';
  }

  function restoreWidget() {
    document.getElementById('mini-pill').style.display = 'none';
    document.getElementById('floating-widget').style.display = 'block';
  }

  function exitWidget() {
    document.getElementById('floating-widget').style.display = 'none';
    document.getElementById('mini-pill').style.display       = 'none';
    showToast('Widget closed. Refresh page to reopen.');
  }

  // ============================================================
  // DRAGGABLE
  // ============================================================
  function makeDraggable(el) {
    let ox, oy, active = false;

    const onStart = (cx, cy) => {
      const r = el.getBoundingClientRect();
      ox = cx - r.left; oy = cy - r.top;
      active = true; el.style.transition = 'none'; el.style.right = 'auto';
    };
    const onMove = (cx, cy) => {
      if (!active) return;
      const maxX = window.innerWidth  - el.offsetWidth;
      const maxY = window.innerHeight - el.offsetHeight;
      el.style.left = Math.max(0, Math.min(maxX, cx - ox)) + 'px';
      el.style.top  = Math.max(0, Math.min(maxY, cy - oy)) + 'px';
    };
    const onEnd = () => { active = false; };

    el.addEventListener('mousedown',  e => { if (e.button===0) onStart(e.clientX, e.clientY); });
    document.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
    document.addEventListener('mouseup',   onEnd);
    el.addEventListener('touchstart',  e => { const t=e.touches[0]; onStart(t.clientX,t.clientY); }, {passive:true});
    document.addEventListener('touchmove', e => { const t=e.touches[0]; onMove(t.clientX,t.clientY); }, {passive:true});
    document.addEventListener('touchend',  onEnd);
  }

  makeDraggable(document.getElementById('floating-widget'));
  makeDraggable(document.getElementById('mini-pill'));

  // ============================================================
  // CLOCK
  // ============================================================
  function startClock() {
    const tick = () => {
      const d = new Date();
      let h = d.getHours(), m = d.getMinutes(), s = d.getSeconds();
      const ap = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      document.getElementById('live-time').textContent =
        `${p2(h)}:${p2(m)}:${p2(s)} ${ap}`;
    };
    tick(); setInterval(tick, 1000);
  }

  const p2 = n => String(n).padStart(2, '0');

  // ============================================================
  // DATA POLLING  — fetches from Flask API
  // Expected JSON:
  //   { period, prediction, logic, countdown, step, loss_streak, balance, mode }
  // ============================================================
  function updateWidget(d) {
    const pred = (d.prediction || 'WAIT').toUpperCase();

    // Prediction label
    const predEl = document.getElementById('predict-label');
    predEl.textContent = pred;
    predEl.className   = 'predict-label ' + pred;

    // Period / logic
    document.getElementById('period-number').textContent = d.period   || '—';
    document.getElementById('logic-text').textContent    = d.logic    || '';

    // Countdown — use backend value if available, otherwise rely on local ticker
    if (typeof d.countdown === 'number') {
      document.getElementById('countdown-val').textContent = d.countdown;
    }

    // Meta chips
    document.getElementById('step-val').textContent    = d.step        ?? '1';
    document.getElementById('streak-val').textContent  = d.loss_streak ?? '0';
    document.getElementById('balance-val').textContent = d.balance     || 'N/A';

    // Mode badge
    document.getElementById('mode-badge').textContent = d.mode || 'Wingo 30sec';

    // Mini pill sync
    const pillEl = document.getElementById('pill-label');
    pillEl.textContent = pred === 'WAIT' ? 'HT' : pred;
    pillEl.className   = 'pill-label ' + pred;
    document.getElementById('pill-timer').textContent =
      (typeof d.countdown === 'number' ? d.countdown + 's' : '--');
  }

  function setStatus(online, msg) {
    document.getElementById('status-dot').className  = 'status-dot' + (online ? '' : ' offline');
    document.getElementById('status-text').textContent = msg;
  }

  async function fetchData() {
    try {
      const res  = await fetch(API_URL, { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      updateWidget(data);
      setStatus(true, 'Live — connected to afnans_bot');
    } catch {
      setStatus(false, 'Backend offline — connecting to afnans_bot..');
    }
  }

  function startPolling() {
    fetchData();
    setInterval(fetchData, CFG.POLL_MS);
  }

  // ============================================================
  // TOAST
  // ============================================================
  function showToast(msg, ms = 2800) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), ms);
  }

  // Force light mode
  document.documentElement.style.colorScheme = 'light';
</script>
</body>
</html>
